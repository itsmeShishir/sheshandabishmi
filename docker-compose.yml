services:
  backend:
    build: .
    ports:
      - "8541:8541"
    env_file:
      - .env
    environment:
      PORT: 8541
      BACKEND_ONLY: "true"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8540:8540"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
